<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה | Reception</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@600;700&family=Heebo:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            primary: {
              DEFAULT: 'var(--primary)',
              foreground: 'var(--primary-foreground)',
            },
            muted: {
              DEFAULT: 'var(--muted)',
              foreground: 'var(--muted-foreground)',
            },
            border: 'var(--border)',
            ring: 'var(--ring)',
          },
          borderRadius: {
            lg: 'var(--radius)',
          },
          fontFamily: {
            sans: ['Heebo', 'system-ui', 'sans-serif'],
            display: ['Frank Ruhl Libre', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --background: oklch(0.98 0.004 155);
      --foreground: oklch(0.22 0.03 155);
      --primary: oklch(0.38 0.11 155);
      --primary-foreground: oklch(0.99 0 0);
      --muted: oklch(0.94 0.014 155);
      --muted-foreground: oklch(0.42 0.035 155);
      --border: oklch(0.88 0.018 155);
      --ring: oklch(0.45 0.1 155);
      --radius: 0.5rem;
      --font-display: 'Zilla Slab', Georgia, serif;
      --font-body: 'Libre Franklin', system-ui, sans-serif;
      --header-height: 4rem;
      --space-section-x: clamp(1rem, 4vw, 1.5rem);
    }

    html {
      font-family: var(--font-body);
      background: var(--background);
    }

    body {
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: auto;
      -moz-osx-font-smoothing: auto;
    }

    h1 {
      font-family: var(--font-display);
      line-height: 1.15;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .page-shell {
      width: 100%;
      max-width: 48rem;
      margin-inline: auto;
      padding-inline: var(--space-section-x);
    }

    .site-header {
      border-bottom: 1px solid color-mix(in oklch, var(--border) 60%, transparent);
      background-color: var(--background);
    }

    .site-header__bar {
      min-height: var(--header-height);
      display: flex;
      align-items: center;
    }

    .site-header__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
    }

    .site-wordmark {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--foreground);
      text-decoration: none;
    }

    .lang-link {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      text-decoration: none;
      transition: color 0.15s ease-out;
    }

    .lang-link:hover {
      color: var(--foreground);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="site-header">
    <div class="site-header__bar">
      <div class="page-shell">
        <div class="site-header__inner">
          <a href="/he/" class="site-wordmark">Reception</a>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center py-16 sm:py-24">
    <div class="page-shell text-center">
      <div class="mx-auto max-w-md">
        <div class="mx-auto mb-6 flex h-14 w-14 items-center justify-center rounded-full bg-primary/10 text-primary" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        </div>

        <h1 class="text-3xl font-semibold text-foreground sm:text-4xl">קיבלנו.</h1>
        <p class="mt-4 text-base leading-relaxed text-muted-foreground sm:text-lg">
          הטופס נשלח בהצלחה. ניצור איתך קשר בקרוב כדי להקים את Reception על המספר שלך.
        </p>

        <a href="/he/" class="mt-8 inline-flex h-11 items-center justify-center rounded-lg border border-transparent bg-primary px-6 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/80 focus-visible:outline-none focus-visible:ring-3 focus-visible:ring-ring/50">
          חזרה לדף הבית
        </a>
      </div>
    </div>
  </main>

  <footer class="border-t border-border py-8">
    <div class="page-shell text-center">
      <nav class="mb-4 flex flex-wrap justify-center gap-4 text-sm text-muted-foreground" aria-label="תחתית">
        <a href="/he/" class="transition-colors hover:text-foreground">דף הבית</a>
        <a href="/he/privacy.html" class="transition-colors hover:text-foreground">מדיניות פרטיות</a>
        <a href="/he/terms.html" class="transition-colors hover:text-foreground">תנאי שימוש</a>
      </nav>
      <p class="text-xs text-muted-foreground">&copy; 2026 <a href="https://argo-navis.net" class="transition-colors hover:text-foreground">argo-navis</a>. כל הזכויות שמורות.</p>
    </div>
  </footer>
</body>
</html>
